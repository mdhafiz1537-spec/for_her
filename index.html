<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love App 💘</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  text-align: center;
  color: white;
}

.container {
  width: 90%;
  max-width: 350px;
}

input {
  padding: 10px;
  border-radius: 20px;
  border: none;
  width: 80%;
  margin-bottom: 10px;
  text-align: center;
}

#message {
  height: 30px;
}

.buttons {
  position: relative;
  height: 150px;
  margin-top: 20px;
}

button {
  padding: 12px 20px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  position: absolute;
}

#yesBtn {
  background: #ff4d6d;
  color: white;
  left: 20%;
}

#noBtn {
  background: white;
  color: #333;
  left: 60%;
}

/* Heart explosion */
.heart {
  position: fixed;
  font-size: 18px;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y)) scale(1.5);
    opacity: 0;
  }
}

/* Ripple */
.ripple {
  position: fixed;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  animation: rippleAnim 0.8s ease-out forwards;
}

@keyframes rippleAnim {
  to {
    width: 200px;
    height: 200px;
    opacity: 0;
  }
}

/* Final Screen */
#finalScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #ff4d6d, #ff9a9e);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: 0.5s;
}

#finalScreen.show {
  opacity: 1;
  pointer-events: all;
}

#finalScreen button {
  margin-top: 130px;
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  background: white;
  color: #ff4d6d;
}

/* Floating hearts */
.float-heart {
  position: fixed;
  bottom: -20px;
  font-size: 20px;
  animation: floatUp 5s linear forwards;
}

@keyframes floatUp {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- 🎵 Background Music -->
<audio id="bgMusic" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <h1>Enter your name 💌</h1>
  <input type="text" id="nameInput" placeholder="Your name...">

  <h1>Do you love me? 💖</h1>
  <div id="message"></div>

  <div class="buttons">
    <button id="yesBtn">Yes 😍</button>
    <button id="noBtn">No 😅</button>
  </div>
</div>

<!-- Final Screen -->
<div id="finalScreen">
  <h1 id="finalTitle"></h1>

  <button id="finalYes">Yes 💖</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");
const container = document.querySelector(".buttons");
const finalScreen = document.getElementById("finalScreen");
const finalTitle = document.getElementById("finalTitle");
const nameInput = document.getElementById("nameInput");

let scale = 1;

const messages = [
  "Why no 😭",
  "Think again 💔",
  "That hurts 😢",
  "You sure? 😳",
  "Come on... yes 💖"
];

// Move NO button
noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("touchstart", moveNo);

function moveNo() {
  const maxX = container.clientWidth - noBtn.offsetWidth;
  const maxY = container.clientHeight - noBtn.offsetHeight;

  noBtn.style.left = Math.random() * maxX + "px";
  noBtn.style.top = Math.random() * maxY + "px";

  scale *= 0.9;
  noBtn.style.transform = `scale(${scale})`;

  message.textContent = messages[Math.floor(Math.random()*messages.length)];
}

// YES CLICK (first screen)
yesBtn.addEventListener("click", (e) => {
  const name = nameInput.value || "Love";

  finalTitle.textContent = `Will you be mine forever, ${name}? 💍💖`;

  createBurst(e.clientX, e.clientY);

  setTimeout(() => {
    finalScreen.classList.add("show");
  }, 800);
});

// FINAL YES CLICK 😈
document.getElementById("finalYes").addEventListener("click", () => {
  const name = nameInput.value || "Love";

  finalTitle.textContent = "";

  setTimeout(() => {
    finalTitle.textContent = `${name}, you are mine hehe 😈💖`;
    startHearts();
  }, 300);
});

// Heart burst
function createBurst(x, y) {
  for (let i = 0; i < 25; i++) {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    const angle = Math.random() * 2 * Math.PI;
    const distance = Math.random() * 100;

    heart.style.setProperty("--x", Math.cos(angle)*distance + "px");
    heart.style.setProperty("--y", Math.sin(angle)*distance + "px");

    heart.style.left = x + "px";
    heart.style.top = y + "px";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 1000);
  }

  const ripple = document.createElement("div");
  ripple.className = "ripple";
  ripple.style.left = (x - 100) + "px";
  ripple.style.top = (y - 100) + "px";

  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 800);
}

// Floating hearts
function startHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "float-heart";
    heart.innerHTML = "💗";

    heart.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }, 300);
}

// Fix autoplay (mobile)
document.body.addEventListener("click", () => {
  document.getElementById("bgMusic").play();
});
</script>

</body>
</html>
